<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F4FAF5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Money">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <title>Money</title>
</head>
<body>
    <div id="app">
        <header id="app-header">
            <a href="#dashboard" class="header-icon-btn header-home-btn" data-view="dashboard" aria-label="Dashboard">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 10.5 12 3l9 7.5M5 9v11h5v-6h4v6h5V9"/>
                </svg>
            </a>
            <h1 id="page-title">Money</h1>
            <a href="#profile" class="header-icon-btn header-avatar-btn" data-view="profile" aria-label="Profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="3.4"/>
                    <path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>
                </svg>
            </a>
        </header>

        <main id="app-main"></main>

        <nav id="app-nav">
            <a href="#dashboard" class="nav-item" data-view="dashboard">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="#add" class="nav-item nav-item-add" data-view="add">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                </span>
                <span class="nav-label">Add</span>
            </a>
            <a href="#transactions" class="nav-item" data-view="transactions">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16M4 12h16M4 18h10"/>
                    </svg>
                </span>
                <span class="nav-label">Transactions</span>
            </a>
            <a href="#budgets" class="nav-item" data-view="budgets">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 6v2m0 8v2M9.5 9.5c.4-.8 1.2-1.5 2.5-1.5 1.7 0 2.5 1 2.5 2 0 2.5-5 2-5 4.5 0 1.1.9 2 2.5 2 1.4 0 2.2-.7 2.5-1.5"/>
                    </svg>
                </span>
                <span class="nav-label">Budget</span>
            </a>
            <a href="#insights" class="nav-item" data-view="insights">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="17" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                        <path d="M8 14h2M14 14h2M8 18h2"/>
                    </svg>
                </span>
                <span class="nav-label">Insights</span>
            </a>
            <a href="#import" class="nav-item" data-view="import">
                <span class="nav-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </span>
                <span class="nav-label">Import</span>
            </a>
        </nav>
    </div>

    <div id="toast-container"></div>

    <!-- Load order: utils → api → components → views → app -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="/js/components/confirm-dialog.js"></script>
    <script src="/js/components/chart.js"></script>
    <script src="/js/views/login.js"></script>
    <script src="/js/views/register.js"></script>
    <script src="/js/views/forgot-password.js"></script>
    <script src="/js/views/reset-password.js"></script>
    <script src="/js/views/verify-email.js"></script>
    <script src="/js/views/dashboard.js"></script>
    <script src="/js/views/add-transaction.js"></script>
    <script src="/js/views/transactions.js"></script>
    <script src="/js/views/insights.js"></script>
    <script src="/js/views/year-end.js"></script>
    <script src="/js/views/budgets.js"></script>
    <script src="/js/views/import.js"></script>
    <script src="/js/views/profile.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
